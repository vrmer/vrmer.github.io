name: Daily Word

on:
  schedule:
    - cron: '0 5 * * *'  # 6 AM CET (UTC+1); 7 AM CEST (UTC+2) in summer
  workflow_dispatch:       # allow manual trigger from GitHub Actions UI

jobs:
  update-word:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Pick random word and write JSON
        run: |
          WORD=$(shuf -n 1 data/words.txt)
          DATE=$(TZ="Europe/Budapest" date +%Y-%m-%d)
          echo "{\"word\": \"$WORD\", \"date\": \"$DATE\"}" > data/word-of-day.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/word-of-day.json
          git commit -m "Daily word: $(python3 -c \"import json; print(json.load(open('data/word-of-day.json'))['word'])\")"
          git push
